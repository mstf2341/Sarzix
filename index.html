<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARZIX - Private Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-green: #075e54; --wa-light: #25d366; --bg: #e5ddd5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* شاشة الدخول */
        #auth-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--wa-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* الهيدر */
        header { background: var(--wa-green); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        header i { cursor: pointer; font-size: 20px; }

        /* قائمة المستخدمين */
        #contacts-page { flex: 1; background: white; overflow-y: auto; }
        .contact-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .contact-item:hover { background: #f9f9f9; }
        .avatar { width: 50px; height: 50px; background: #ddd; border-radius: 50%; margin-left: 15px; }

        /* صفحة الشات */
        #chat-page { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s; z-index: 1000; }
        #chat-page.active { transform: translateX(0); }
        #messages-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .bubble { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 15px; position: relative; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .bubble.sent { align-self: flex-start; background: #dcf8c6; border-top-right-radius: 0; }
        .bubble.received { align-self: flex-end; background: white; border-top-left-radius: 0; }

        /* منطقة الإرسال */
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; margin: 0; border-radius: 25px; border: none; padding: 12px 15px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--wa-green);">SARZIX</h1>
        <div id="reg-fields" class="hidden">
            <input type="text" id="reg-username" placeholder="اسمك الذي سيظهر للناس">
        </div>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn" onclick="handleAuth()" id="auth-btn">دخول</button>
        <p onclick="toggleAuth()" id="toggle-text" style="color:var(--wa-green); cursor:pointer; margin-top:15px;">تسجيل حساب جديد</p>
    </div>
</div>

<header id="main-header">
    <i class="fa fa-sign-out" onclick="auth.signOut()"></i>
    <h2 style="margin:0; flex:1;">SARZIX</h2>
</header>
<div id="contacts-page">
    <p style="padding:20px; color:#777; text-align:center;">جاري تحميل جهات الاتصال...</p>
</div>

<div id="chat-page">
    <header>
        <i class="fa fa-arrow-right" onclick="closeChat()"></i>
        <div class="avatar" style="width:35px; height:35px;"></div>
        <h3 id="chat-with-name" style="margin:0; font-size:16px;">الاسم</h3>
    </header>
    <div id="messages-container"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="اكتب رسالة...">
        <button onclick="sendPrivateMsg()" style="background:var(--wa-green); color:white; border:none; width:45px; height:45px; border-radius:50%;"><i class="fa fa-paper-plane"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, where, or, and } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAEmoZ9PzSfTJzWbPn_yRxDnKxHR-z4Y4A",
        authDomain: "mstf-b.firebaseapp.com",
        projectId: "mstf-b",
        storageBucket: "mstf-b.firebasestorage.app",
        messagingSenderId: "837143491416",
        appId: "1:837143491416:web:6ddc6f561b74244ccc6b2d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLogin = true;
    let currentUser = null;
    let targetUser = null; // الشخص اللي بتكلمه

    window.toggleAuth = () => {
        isLogin = !isLogin;
        document.getElementById('reg-fields').classList.toggle('hidden');
        document.getElementById('auth-btn').innerText = isLogin ? "دخول" : "تسجيل";
    };

    window.handleAuth = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        try {
            if(isLogin) await signInWithEmailAndPassword(auth, e, p);
            else {
                const u = document.getElementById('reg-username').value;
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", res.user.uid), { username: u, uid: res.user.uid });
            }
        } catch(err) { alert(err.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            const s = await getDoc(doc(db, "users", user.uid));
            currentUser = s.data();
            loadUsers();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    // تحميل قائمة المستخدمين
    function loadUsers() {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('contacts-page');
            list.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                if(u.uid !== auth.currentUser.uid) {
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.innerHTML = `<div class="avatar"></div><div><b>${u.username}</b><br><small style="color:#777;">اضغط لبدء المحادثة</small></div>`;
                    item.onclick = () => openChat(u);
                    list.appendChild(item);
                }
            });
        });
    }

    // فتح الشات الخاص
    window.openChat = (user) => {
        targetUser = user;
        document.getElementById('chat-with-name').innerText = user.username;
        document.getElementById('chat-page').classList.add('active');
        loadMessages();
    };

    window.closeChat = () => {
        document.getElementById('chat-page').classList.remove('active');
    };

    // إرسال رسالة خاصة
    window.sendPrivateMsg = async () => {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        await addDoc(collection(db, "messages"), {
            text: inp.value,
            sender: auth.currentUser.uid,
            receiver: targetUser.uid,
            time: Date.now()
        });
        inp.value = "";
    };

    // تحميل الرسائل الخاصة فقط بين الشخصين
    function loadMessages() {
        const q = query(collection(db, "messages"), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const cont = document.getElementById('messages-container');
            cont.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                // شرط: الرسالة تكون مرسلة مني له، أو منه لي
                if((m.sender === auth.currentUser.uid && m.receiver === targetUser.uid) || 
                   (m.sender === targetUser.uid && m.receiver === auth.currentUser.uid)) {
                    const type = m.sender === auth.currentUser.uid ? 'sent' : 'received';
                    cont.innerHTML += `<div class="bubble ${type}">${m.text}</div>`;
                }
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }
</script>
</body>
</html>
