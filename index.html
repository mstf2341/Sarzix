<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARZIX - النسخة الشاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1da1f2; --black: #000; --white: #fff; --gray: #f5f8fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--white); overflow-x: hidden; }
        
        /* شاشات الدخول */
        #auth-screen { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; text-align: center; }
        .auth-card h1 { color: var(--primary); font-size: 3rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 25px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 25px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* التصميم الأساسي */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 100; }
        .page { display: none; padding: 15px; padding-bottom: 80px; }
        .active-page { display: block; }
        
        /* التغريدات */
        .post { padding: 15px; border-bottom: 1px solid #eee; }
        .post-user { font-weight: bold; color: var(--black); }
        .post-content { margin: 10px 0; font-size: 1.1rem; }
        .post-actions { display: flex; gap: 25px; color: #555; }
        
        /* التنقل السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .bottom-nav i { font-size: 22px; color: #555; cursor: pointer; }
        .bottom-nav i.active { color: var(--primary); }

        .hidden { display: none !important; }
        .fab { position: fixed; bottom: 85px; left: 20px; background: var(--primary); color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-box">
        <h1>SARZIX</h1>
        <div id="register-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="الاسم الكامل">
            <input type="text" id="reg-username" placeholder="اسم المستخدم (بالإنجليزي)">
        </div>
        <input type="email" id="auth-email" placeholder="البريد الإلكتروني">
        <input type="password" id="auth-pass" placeholder="كلمة المرور">
        <button class="btn-main" id="auth-btn" onclick="handleAuth()">دخول</button>
        <p id="toggle-text" style="margin-top:15px; cursor:pointer; color:var(--primary);" onclick="toggleAuthMode()">ليس لديك حساب؟ تسجيل جديد</p>
    </div>
</div>

<div id="main-content" class="hidden">
    <header>
        <i class="fa fa-user-shield hidden" id="admin-icon" style="color:red;" onclick="switchPage('admin')"></i>
        <h2 style="color:var(--primary); margin:0;">SARZIX</h2>
        <i class="fa-regular fa-paper-plane" onclick="alert('الخاص قريباً')"></i>
    </header>

    <div id="home" class="page active-page">
        <div id="feed">جارِ تحميل المنشورات...</div>
    </div>

    <div id="reels" class="page">
        <div style="height:70vh; background:#000; border-radius:15px; display:flex; align-items:center; justify-content:center; color:white;">
            <p>لا توجد فيديوهات حالياً</p>
        </div>
    </div>

    <div id="predictions" class="page">
        <h3>🏆 جدول المباريات والتوقعات</h3>
        <div id="match-list"></div>
    </div>

    <div id="profile" class="page">
        <div style="text-align:center;">
            <div style="width:80px; height:80px; background:#eee; border-radius:50%; margin:auto;"></div>
            <h2 id="p-name">...</h2>
            <p id="p-username" style="color:#777;"></p>
            <hr>
            <button class="btn-main" style="background:#eee; color:black;" onclick="auth.signOut()">تسجيل خروج</button>
        </div>
    </div>

    <div id="admin" class="page">
        <h2 style="color:red;">لوحة التحكم</h2>
        <input type="text" id="m-teams" placeholder="فريق 1 vs فريق 2">
        <input type="date" id="m-date">
        <button class="btn-main" onclick="addMatch()">إضافة مباراة</button>
    </div>

    <div class="fab" onclick="addNewPost()"><i class="fa fa-plus"></i></div>

    <nav class="bottom-nav">
        <i class="fa fa-home active" onclick="switchPage('home', this)"></i>
        <i class="fa fa-play" onclick="switchPage('reels', this)"></i>
        <i class="fa fa-trophy" onclick="switchPage('predictions', this)"></i>
        <i class="fa fa-user" onclick="switchPage('profile', this)"></i>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAEmoZ9PzSfTJzWbPn_yRxDnKxHR-z4Y4A",
        authDomain: "mstf-b.firebaseapp.com",
        projectId: "mstf-b",
        storageBucket: "mstf-b.firebasestorage.app",
        messagingSenderId: "837143491416",
        appId: "1:837143491416:web:6ddc6f561b74244ccc6b2d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLoginMode = true;
    let userData = null;

    // تبديل بين دخول وتسجيل جديد
    window.toggleAuthMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('register-fields').classList.toggle('hidden');
        document.getElementById('auth-btn').innerText = isLoginMode ? "دخول" : "إنشاء حساب";
        document.getElementById('toggle-text').innerText = isLoginMode ? "ليس لديك حساب؟ تسجيل جديد" : "لديك حساب؟ سجل دخول";
    };

    // معالجة الدخول والاشتراك
    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;

        try {
            if (isLoginMode) {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                const name = document.getElementById('reg-name').value;
                const userN = document.getElementById('reg-username').value;
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                // حفظ البيانات في Firestore
                await setDoc(doc(db, "users", res.user.uid), {
                    name: name,
                    username: userN,
                    email: email,
                    role: 'user'
                });
            }
        } catch (e) { alert("خطأ: " + e.message); }
    };

    // مراقبة حالة المستخدم
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            const d = await getDoc(doc(db, "users", user.uid));
            userData = d.data();
            
            if (userData) {
                document.getElementById('p-name').innerText = userData.name;
                document.getElementById('p-username').innerText = "@" + userData.username;
            }
            if (user.email === "sarzix2005@gmail.com") document.getElementById('admin-icon').classList.remove('hidden');
            
            loadPosts();
            loadMatches();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
        }
    });

    // التنقل
    window.switchPage = (p, el) => {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
        document.getElementById(p).classList.add('active-page');
        if(el) {
            document.querySelectorAll('.bottom-nav i').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    };

    // إضافة منشور
    window.addNewPost = async () => {
        const txt = prompt("ماذا يدور في ذهنك؟");
        if(txt) {
            await addDoc(collection(db, "posts"), {
                content: txt,
                username: userData.username,
                time: Date.now()
            });
        }
    };

    function loadPosts() {
        const q = query(collection(db, "posts"), orderBy("time", "desc"));
        onSnapshot(q, (s) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            s.forEach(doc => {
                const p = doc.data();
                feed.innerHTML += `<div class="post">
                    <div class="post-user">@${p.username}</div>
                    <div class="post-content">${p.content}</div>
                    <div class="post-actions"><i class="fa fa-heart"></i> <i class="fa fa-comment"></i></div>
                </div>`;
            });
        });
    }

    // إدارة المباريات
    window.addMatch = async () => {
        const t = document.getElementById('m-teams').value;
        const d = document.getElementById('m-date').value;
        await addDoc(collection(db, "matches"), { teams: t, date: d });
        alert("تمت الإضافة");
    };

    function loadMatches() {
        onSnapshot(collection(db, "matches"), (s) => {
            const list = document.getElementById('match-list');
            list.innerHTML = "";
            s.forEach(doc => {
                const m = doc.data();
                list.innerHTML += `<div style="border:1px solid #eee; padding:10px; margin-bottom:10px; border-radius:10px;">
                    <b>${m.teams}</b> - ${m.date}
                    <button style="float:left;" onclick="alert('سجل توقعك!')">توقع</button>
                </div>`;
            });
        });
    }

</script>
</body>
</html>
